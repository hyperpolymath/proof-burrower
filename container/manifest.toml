# SPDX-License-Identifier: PMPL-1.0-or-later
#
# Cerro Torre manifest for Proof Burrower .ctp bundle
#
# This manifest describes the container image for verified
# container packaging. Used by `ct pack` to create .ctp bundles.

[metadata]
name = "{{SERVICE_NAME}}"
version = "0.0.1"
revision = 1
summary = "Find the mathematical home for a novel proof goal — corpus-similarity search across mathlibs"
description = """
Proof Burrower — containerised service packaged as a verified
cerro-torre .ctp bundle with Ed25519 signing and full provenance
tracking.
"""
license = "PMPL-1.0-or-later"
homepage = "https://github.com/hyperpolymath/proof-burrower"
maintainer = "Jonathan D.A. Jewell <j.d.a.jewell@open.ac.uk>"

[provenance]
upstream = "https://github.com/hyperpolymath/proof-burrower"
import_date = 2026-04-26T00:00:00Z

[dependencies]
runtime = ["ca-certificates", "curl"]
build = []

[build]
system = "podman"

[build.environment]
APP_HOST = "[::]"
APP_PORT = "{{PORT}}"

[outputs]
primary = "{{SERVICE_NAME}}"
split = []

[attestations]
require = ["source-signature", "sbom-complete"]
recommend = ["security-audit", "reproducible-build"]

# Runtime security profile
[security]
user = "appuser"
group = "appuser"
read_only_root = false
no_new_privileges = true

[security.capabilities]
drop = ["ALL"]
add = ["NET_BIND_SERVICE"]

[security.network]
listen_tcp = [{{PORT}}]

[security.filesystem]
read = ["/app/", "/data/"]
write = ["/data/", "/tmp/"]
execute = ["/app/entrypoint.sh"]
